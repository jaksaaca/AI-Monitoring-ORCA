<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA — Secure Login</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
            color: #ededed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1, h2, h3, h4, h5, h6, .brand-font {
            font-family: 'Outfit', sans-serif !important;
            letter-spacing: -0.02em;
        }
        .login-card { 
            width: 100%;
            max-width: 400px;
            border: 1px solid #1f1f1f !important;
            background-color: #0a0a0a !important; 
            border-radius: 12px !important;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.5) !important;
            padding: 2rem;
        }
        .form-control {
            background-color: #000000 !important;
            border: 1px solid #333 !important;
            color: #ededed !important;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            border-color: #666 !important;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
        }
        .btn-primary {
            background-color: #ededed !important;
            color: #000000 !important;
            border: 1px solid #ffffff !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #d4d4d4 !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <i data-lucide="shield-check" class="text-secondary mb-2" style="width: 48px; height: 48px;"></i>
            <h3 class="brand-font fw-bold mb-0">ORCA System</h3>
            <p class="text-secondary small">Authorized Personnel Only</p>
        </div>

        <div id="error-msg" class="alert alert-danger py-2 small d-none text-center border-0" style="background-color: rgba(239, 68, 68, 0.1); color: #ef4444;">
            Invalid credentials.
        </div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label small text-secondary">Username</label>
                <input type="text" id="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2">
                Sign In
            </button>
            <button type="button" id="btn-init" class="btn btn-outline-secondary w-100 mt-3 btn-sm d-none">
                Init Superadmin
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>lucide.createIcons();</script>
    <script type="module" src="assets/js/login.js"></script>
</body>
</html>
