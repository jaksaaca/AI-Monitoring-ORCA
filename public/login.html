<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ORCA System — Secure login portal for authorized monitoring personnel.">
    <title>ORCA — Secure Login</title>
    <link rel="icon" type="image/png" href="assets/images/orbizlogo.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/css/style.css?v=5">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { 
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="login-card card">
        <div class="text-center mb-4">
            <i data-lucide="shield-check" class="text-secondary mb-2" style="width: 48px; height: 48px;"></i>
            <h3 class="brand-font fw-bold mb-0">ORCA System</h3>
            <p class="text-secondary small">Authorized Personnel Only</p>
        </div>

        <div id="error-msg" class="alert alert-danger py-2 small d-none text-center border-0" style="background-color: rgba(239, 68, 68, 0.1); color: #ef4444;">
            Invalid credentials.
        </div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label small text-secondary">Username</label>
                <input type="text" id="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2">
                Sign In
            </button>
            <button type="button" id="btn-init" class="btn btn-outline-secondary w-100 mt-3 btn-sm d-none">
                Init Superadmin
            </button>
        </form>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 mt-auto fixed-bottom" style="background-color: transparent;">
        <small class="text-secondary">&copy; 2026 ORCA Operator. Developed by Jaksa Setia Alam</small>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>lucide.createIcons();</script>
    <script type="module" src="assets/js/login.js?v=5"></script>
</body>
</html>
