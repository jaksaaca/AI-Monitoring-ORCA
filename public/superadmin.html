<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA — Superadmin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
            color: #ededed;
        }
        h1, h2, h3, h4, h5, h6, .brand-font {
            font-family: 'Outfit', sans-serif !important;
            letter-spacing: -0.02em;
        }
        .navbar { 
            border-bottom: 1px solid #1f1f1f !important; 
            background-color: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(12px);
        }
        .card { 
            border: 1px solid #1f1f1f !important;
            background-color: #0a0a0a !important; 
            border-radius: 12px !important;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.5) !important;
        }
        .card-header {
            border-bottom: 1px solid #1f1f1f !important;
            background-color: transparent !important;
        }
        .nav-tabs .nav-link {
            color: #a1a1aa;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 1rem 1.5rem;
            font-weight: 500;
        }
        .nav-tabs .nav-link:hover {
            color: #ededed;
            border-color: transparent;
        }
        .nav-tabs .nav-link.active {
            color: #ededed;
            background: transparent;
            border-color: #ededed;
        }
        .form-control, .form-select {
            background-color: #000000 !important;
            border: 1px solid #333 !important;
            color: #ededed !important;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #666 !important;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
        }
        .btn-primary {
            background-color: #ededed !important;
            color: #000000 !important;
            border: 1px solid #ffffff !important;
            font-weight: 500;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background-color: #d4d4d4 !important;
        }
        .table { color: #ededed; }
        .table th { border-bottom: 1px solid #333; background-color: #0a0a0a; color: #a1a1aa; font-weight: 500; }
        .table td { border-bottom: 1px solid #1f1f1f; background-color: #0a0a0a; vertical-align: middle; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg py-3 px-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2 fs-5 fw-semibold text-white" href="#">
                <i data-lucide="shield-check" class="text-white"></i> ORCA <span class="text-secondary fw-normal px-2">|</span> Superadmin
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-secondary small">Logged in as <strong class="text-white" id="display-user">...</strong></span>
                <button id="btn-logout" class="btn btn-outline-secondary btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4 flex-grow-1">
        <!-- Tabs Nav -->
        <ul class="nav nav-tabs mb-4 border-secondary" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active d-flex align-items-center gap-2" data-bs-toggle="tab" data-bs-target="#analytics" type="button">
                    <i data-lucide="bar-chart-2" style="width: 18px;"></i> Analytics & Export
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link d-flex align-items-center gap-2" data-bs-toggle="tab" data-bs-target="#accounts" type="button">
                    <i data-lucide="users" style="width: 18px;"></i> Account Management
                </button>
            </li>
        </ul>

        <!-- Tabs Content -->
        <div class="tab-content" id="adminTabsContent">
            
            <!-- ANALYTICS TAB -->
            <div class="tab-pane fade show active" id="analytics" role="tabpanel">
                <div class="row g-4">
                    <!-- Filters -->
                    <div class="col-lg-3">
                        <div class="card h-100">
                            <div class="card-header py-3">
                                <h6 class="mb-0 fw-semibold d-flex align-items-center gap-2">
                                    <i data-lucide="filter" class="text-secondary" style="width: 18px;"></i> Data Filters
                                </h6>
                            </div>
                            <div class="card-body d-flex flex-column gap-3">
                                <div>
                                    <label class="form-label small text-secondary">Studio</label>
                                    <select id="filter-studio" class="form-select form-select-sm">
                                        <option value="all">All Studios</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label small text-secondary">Brand</label>
                                    <select id="filter-brand" class="form-select form-select-sm">
                                        <option value="all">All Brands</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label small text-secondary">Host</label>
                                    <select id="filter-host" class="form-select form-select-sm">
                                        <option value="all">All Hosts</option>
                                    </select>
                                </div>
                                
                                <hr class="border-secondary my-2">
                                <div class="text-center">
                                    <span class="text-secondary small">Matching Sessions:</span>
                                    <h3 class="mb-3 fw-bold" id="match-count">0</h3>
                                    <button id="btn-download" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                                        <i data-lucide="download" style="width: 18px;"></i> Download CSV
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Data Table -->
                    <div class="col-lg-9">
                        <div class="card h-100">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead>
                                            <tr>
                                                <th class="ps-4 py-3">Date</th>
                                                <th class="py-3">Studio</th>
                                                <th class="py-3">Brand</th>
                                                <th class="py-3">Host</th>
                                                <th class="py-3">Total Duration</th>
                                                <th class="py-3">Face %</th>
                                                <th class="py-3">Speak %</th>
                                            </tr>
                                        </thead>
                                        <tbody id="logs-tbody">
                                            <tr><td colspan="7" class="text-center py-4 text-secondary">Loading data from Firebase...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACCOUNTS TAB -->
            <div class="tab-pane fade" id="accounts" role="tabpanel">
                <div class="row g-4">
                    <!-- Create User Form -->
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header py-3">
                                <h6 class="mb-0 fw-semibold d-flex align-items-center gap-2">
                                    <i data-lucide="user-plus" class="text-secondary" style="width: 18px;"></i> Create New Account
                                </h6>
                            </div>
                            <div class="card-body">
                                <form id="form-create-user">
                                    <div class="mb-3">
                                        <label class="form-label small text-secondary">Username</label>
                                        <input type="text" id="new-username" class="form-control form-control-sm" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small text-secondary">Password</label>
                                        <input type="password" id="new-password" class="form-control form-control-sm" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label small text-secondary">Role</label>
                                        <select id="new-role" class="form-select form-select-sm">
                                            <option value="operator">Operator (Monitor Only)</option>
                                            <option value="admin">Admin (Upload Schedule Only)</option>
                                            <option value="superadmin">Superadmin (Full Access)</option>
                                        </select>
                                    </div>
                                    <button type="submit" id="btn-create-user" class="btn btn-primary w-100">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Users List -->
                    <div class="col-lg-8">
                        <div class="card h-100">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead>
                                            <tr>
                                                <th class="ps-4 py-3">Username</th>
                                                <th class="py-3">Role</th>
                                                <th class="py-3">Created At</th>
                                                <th class="pe-4 py-3 text-end">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="users-tbody">
                                            <tr><td colspan="4" class="text-center py-4 text-secondary">Loading accounts...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>lucide.createIcons();</script>
    <script type="module" src="assets/js/superadmin.js"></script>
</body>
</html>
